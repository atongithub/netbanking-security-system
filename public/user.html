<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Bank | Private Wealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfaf8; color: #1a1a1a; transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { background-color: #0f0f0f; color: #f5f5f5; }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .user-accent { color: #1a1a1a; }
        body.dark-mode .user-accent { color: #f5f5f5; }
        
        /* Cards and borders */
        .card-light { background-color: #ffffff; border-color: rgba(0,0,0,0.1); }
        body.dark-mode .card-light { background-color: #1a1a1a; border-color: rgba(255,255,255,0.1); }
        
        .text-neutral-300 { color: #d4d4d8; }
        body.dark-mode .text-neutral-300 { color: #71717a; }
        
        .text-neutral-400 { color: #a1a1aa; }
        body.dark-mode .text-neutral-400 { color: #52525b; }
        
        .border-black\/10 { border-color: rgba(0,0,0,0.1); }
        body.dark-mode .border-black\/10 { border-color: rgba(255,255,255,0.1); }
        
        .bg-white { background-color: #ffffff; }
        body.dark-mode .bg-white { background-color: #1a1a1a; }
        
        .hover\:bg-neutral-50:hover { background-color: #f9fafb; }
        body.dark-mode .hover\:bg-neutral-50:hover { background-color: #262626; }
        
        .bg-black { background-color: #000000; }
        body.dark-mode .bg-black { background-color: #1a1a1a; }
        
        /* Theme toggle button */
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .theme-toggle button { background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; transition: all 0.3s; }
        body.dark-mode .theme-toggle button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #f5f5f5; }
        .theme-toggle button:hover { background: rgba(0,0,0,0.2); }
        body.dark-mode .theme-toggle button:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-12 space-y-12 max-w-6xl mx-auto">
    <!-- Theme Toggle -->
    <div class="theme-toggle">
        <button onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>
    </div>
    <!-- Header -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6">
        <div>
            <p class="text-[10px] uppercase tracking-[0.3em] font-black text-neutral-400 mb-2">Private Wealth Terminal</p>
            <h1 id="welcomeText" class="serif text-5xl italic tracking-tight leading-none">Welcome back</h1>
        </div>
        <div class="flex items-center gap-8">
            <div class="text-right">
                <p class="text-[10px] uppercase font-bold tracking-widest text-neutral-300">Secure Session</p>
                <div id="currentTime" class="text-xl font-light tracking-tighter italic">--:--:--</div>
            </div>
            <button onclick="logout()" class="text-[10px] uppercase tracking-widest font-black hover:underline cursor-pointer">Logout</button>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
        <div class="lg:col-span-2 space-y-12">
            <!-- Balance Card -->
            <div class="relative bg-white card-light border border-black/10 p-12 overflow-hidden shadow-sm">
                <div class="relative z-10 flex flex-col justify-between h-full min-h-[240px]">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] uppercase tracking-[0.3em] font-bold text-neutral-400 mb-2">Available Liquidity</p>
                            <h2 id="balance" class="serif text-6xl italic tracking-tighter">₹0</h2>
                        </div>
                        <div id="bankInitial" class="h-12 w-12 border border-black/10 flex items-center justify-center italic serif text-2xl">N</div>
                    </div>
                    
                    <div class="flex justify-between items-end gap-6 border-t border-black/5 pt-8 mt-12">
                        <div class="space-y-1">
                            <p id="accountRef" class="text-sm font-medium tracking-[0.2em] uppercase opacity-80">NEXUS PRIVATE •••• ----</p>
                            <p id="accountMeta" class="text-[9px] font-bold uppercase tracking-widest text-neutral-300">STATUS: INITIALIZING • TYPE: --</p>
                        </div>
                        <img src="https://cdn.worldvectorlogo.com/logos/visa-10.svg" alt="Visa" class="h-4 opacity-20">
                    </div>
                </div>
            </div>

            <!-- Transaction Ledger -->
            <div class="bg-white card-light border border-black/10">
                <div class="px-10 py-8 border-b border-black/10 flex justify-between items-center">
                    <h2 class="serif text-2xl italic tracking-tight">Activity Ledger</h2>
                    <button class="text-[10px] uppercase tracking-widest font-black hover:underline">Download Documentation</button>
                </div>
                <div id="transactionBody" class="divide-y divide-black/5">
                    <!-- Transactions go here -->
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div class="space-y-12">
            <div class="bg-white card-light border border-black/10 p-10">
                <h3 class="serif text-xl italic mb-8 border-b border-black/10 pb-4">Security Protocol</h3>
                <div class="space-y-6">
                    <div class="flex items-center justify-between">
                        <p class="text-[10px] uppercase font-bold tracking-widest text-neutral-400">Identity Guard</p>
                        <div class="w-8 h-px bg-black opacity-10"></div>
                        <span class="text-[10px] uppercase font-black text-emerald-700 tracking-widest">ENABLED</span>
                    </div>
                    <div class="flex items-center justify-between">
                        <p class="text-[10px] uppercase font-bold tracking-widest text-neutral-400">Account Lock</p>
                        <div class="w-8 h-px bg-black opacity-10"></div>
                        <span class="text-[10px] uppercase font-black text-neutral-300 tracking-widest">OFF</span>
                    </div>
                </div>
            </div>

            <div class="bg-black p-10 text-white">
                <p class="text-[10px] uppercase tracking-[0.3em] font-bold mb-4 opacity-40">nexus institutional</p>
                <h3 class="serif text-2xl italic mb-8 leading-tight">Privileged insights into capital markets.</h3>
                <button class="w-full text-left py-4 border-t border-white/20 text-[10px] uppercase tracking-widest flex justify-between items-center group">
                    <span>Access Outlook</span>
                    <span class="group-hover:translate-x-2 transition-transform">&rarr;</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'true' : 'false');
            updateThemeToggleButton();
        }

        function updateThemeToggleButton() {
            const button = document.querySelector('.theme-toggle button');
            if (button) button.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }

        // On load, apply dark mode if set
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            updateThemeToggleButton();
        });

        // Check authentication first
        const role = localStorage.getItem('nexus_role');
        const user = localStorage.getItem('nexus_user');
        
        if (role !== 'user' || !user) {
            console.log('Not authenticated. Role:', role, 'User:', user);
            window.location.href = '/index.html';
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/index.html';
        }

        setInterval(() => {
            document.getElementById('currentTime').textContent = new Date().toLocaleTimeString();
        }, 1000);

        async function loadProfile() {
            try {
                const user = localStorage.getItem('nexus_user');
                console.log('Loading profile for user:', user);
                
                if (!user) {
                    console.error('No user in localStorage');
                    window.location.href = '/index.html';
                    return;
                }
                
                const url = `/api/user/${user}/overview`;
                console.log('Fetching:', url);
                
                const res = await fetch(url);
                console.log('Response status:', res.status);
                
                if (!res.ok) {
                    console.error('API error:', res.status, res.statusText);
                    return;
                }
                
                const data = await res.json();
                console.log('Profile data:', data);
                
                if (!data.account) {
                    console.error('No account data in response');
                    return;
                }

                document.getElementById('welcomeText').textContent = `Welcome back, ${data.profile.firstName}`;
                document.getElementById('balance').textContent = `₹${parseFloat(data.account.balance).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                document.getElementById('bankInitial').textContent = data.account.bankName[0];
                document.getElementById('accountRef').textContent = `NEXUS PRIVATE •••• ${String(data.account.accountNumber).slice(-4)}`;
                document.getElementById('accountMeta').textContent = `STATUS: ${data.account.status.toUpperCase()} • TYPE: ${data.account.type.toUpperCase()}`;

                const txHtml = data.transactions.map(t => `
                    <div class="px-10 py-6 flex items-center justify-between hover:bg-neutral-50 transition-colors border-t border-black/5 first:border-t-0">
                        <div class="flex items-center gap-6">
                            <div class="text-[10px] uppercase font-bold text-neutral-300 tracking-tighter border border-black/5 p-2 min-w-[64px] text-center">
                                ${new Date(t.timestamp).toLocaleDateString(undefined, {month:'short', day:'numeric'})}
                            </div>
                            <div>
                                <p class="font-bold text-sm tracking-tight">${t.type} Settlement</p>
                                <p class="text-[10px] text-neutral-400 font-medium uppercase tracking-widest italic">REF: ••••${String(t.destAccount).slice(-4)}</p>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-light tracking-tighter italic ${t.sourceAccount === data.account.accountNumber ? 'text-red-800' : 'text-emerald-800'}">
                                ${t.sourceAccount === data.account.accountNumber ? '−' : '+'}₹${parseFloat(t.amount).toLocaleString('en-IN', {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                            </p>
                            <p class="text-[10px] text-neutral-300 font-black uppercase tracking-widest text-[8px]">SETTLED</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('transactionBody').innerHTML = txHtml || '<div class="px-10 py-6 text-neutral-400 text-sm">No transactions</div>';
            } catch (error) {
                console.error('Profile load error:', error);
            }
        }

        loadProfile();
    </script>
</body>
</html>
