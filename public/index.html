<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Bank | Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #fbfaf8; color: #1a1a1a; transition: background-color 0.3s, color 0.3s; }
        body.dark-mode { background-color: #0f0f0f; color: #f5f5f5; }
        .serif { font-family: 'Playfair Display', serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bg-white { background-color: #ffffff; }
        body.dark-mode .bg-white { background-color: #1a1a1a; }
        .border-black\/10 { border-color: rgba(0,0,0,0.1); }
        body.dark-mode .border-black\/10 { border-color: rgba(255,255,255,0.1); }
        .text-neutral-400 { color: #a1a1aa; }
        body.dark-mode .text-neutral-400 { color: #52525b; }
        .text-neutral-500 { color: #78716b; }
        body.dark-mode .text-neutral-500 { color: #515151; }
        .text-neutral-300 { color: #d4d4d8; }
        body.dark-mode .text-neutral-300 { color: #71717a; }
        .bg-black { background-color: #000000; }
        body.dark-mode .bg-black { background-color: #1a1a1a; }
        .hover\:bg-neutral-50:hover { background-color: #f9fafb; }
        body.dark-mode .hover\:bg-neutral-50:hover { background-color: #262626; }
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .theme-toggle button { background: rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.2); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 18px; transition: all 0.3s; }
        body.dark-mode .theme-toggle button { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #f5f5f5; }
        .theme-toggle button:hover { background: rgba(0,0,0,0.2); }
        body.dark-mode .theme-toggle button:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="theme-toggle">
        <button onclick="toggleDarkMode()" title="Toggle Dark Mode">🌙</button>
    </div>
    <div class="w-full max-w-lg">
        <div class="mb-12 text-center md:text-left">
            <p class="text-[10px] uppercase tracking-[0.4em] font-black text-neutral-400 mb-4">Secure Banking</p>
            <h1 class="serif text-6xl italic tracking-tighter leading-none mb-4">Nexus Bank</h1>
            <p class="text-sm font-medium text-neutral-500 max-w-xs leading-relaxed italic">
                Secure portal for private wealth management and security.
            </p>
        </div>

        <div class="bg-white border border-black/10 p-10 md:p-16 shadow-2xl">
            <form id="loginForm" class="space-y-8">
                <div>
                    <label class="block text-[10px] uppercase font-bold tracking-widest text-neutral-400 mb-2">Username</label>
                    <input type="text" id="username" required 
                        class="w-full bg-transparent border-b border-black/10 py-3 text-lg outline-none focus:border-black transition-colors placeholder:text-neutral-200"
                        placeholder="USERNAME">
                </div>
                <div>
                    <label class="block text-[10px] uppercase font-bold tracking-widest text-neutral-400 mb-2">Password</label>
                    <input type="password" id="password" required 
                        class="w-full bg-transparent border-b border-black/10 py-3 text-lg outline-none focus:border-black transition-colors placeholder:text-neutral-200"
                        placeholder="••••••••">
                </div>
                
                <div id="error" class="hidden text-[10px] uppercase font-black text-red-800 tracking-widest animate-pulse">
                    Access Denied: Invalid Credentials
                </div>

                <div class="pt-4">
                    <button type="submit" 
                        class="w-full bg-black text-white py-5 text-[10px] uppercase tracking-[0.3em] font-black hover:bg-neutral-800 transition-all active:scale-[0.98]">
                        Authenticate Profile &rarr;
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-12 flex justify-between items-center text-[10px] uppercase font-bold tracking-widest text-neutral-300">
            <span>© 2026 NEXUS SECURITY</span>
            <span>SYSTEM STATUS: ONLINE</span>
        </div>
    </div>

    <script>
        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', document.body.classList.contains('dark-mode') ? 'true' : 'false');
            updateThemeToggleButton();
        }
        function updateThemeToggleButton() {
            const button = document.querySelector('.theme-toggle button');
            if (button) button.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
        }
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
            updateThemeToggleButton();
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('nexus_role', data.role);
                    localStorage.setItem('nexus_user', data.user.username);
                    localStorage.setItem('nexus_user_id', data.user.id);
                    
                    if (data.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else {
                        window.location.href = '/user.html';
                    }
                } else {
                    // Log failed attempt
                    console.log('Login failed for user:', username);
                    errorEl.classList.remove('hidden');
                    
                    // Clear error message after 3 seconds
                    setTimeout(() => {
                        errorEl.classList.add('hidden');
                    }, 3000);
                }
            } catch (err) {
                console.error(err);
                alert('Connection failure');
            }
        });
    </script>
</body>
</html>
